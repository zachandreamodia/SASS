<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SASS | Dashboard Home</title>



    <style>

        :root {

            --primary: #4dabf7;

            --primary-dark: #339af0;

            --nav-bg: rgba(255, 255, 255, 0.08);

            --glass-border: rgba(255, 255, 255, 0.15);

            --text-main: #f5f7fa;

            --text-muted: #cbd5e1;

        }



        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

        }



        body {

            height: 100vh;

            overflow: hidden;

            background: linear-gradient(135deg, #1e3a5f, #274c77);

            color: var(--text-main);

        }



        /* --- NAVBAR (Unified for seamless transition) --- */

        .navbar {

            display: flex;

            align-items: center;

            height: 80px; /* Fixed height is key */

            padding: 0 60px;

            backdrop-filter: blur(12px);

            -webkit-backdrop-filter: blur(12px);

            background: var(--nav-bg);

            border-bottom: 1px solid var(--glass-border);

            position: relative;

            z-index: 100;

        }



        .logo {

            font-size: 22px;

            font-weight: bold;

            color: var(--primary);

            text-decoration: none;

            flex-shrink: 0;

        }



        .nav-right {

            display: flex;

            align-items: center;

            margin-left: auto; /* Pushes links and profile to the right */

        }



        .nav-links {

            display: flex;

            align-items: center;

        }



        .nav-links a {

            margin-left: 30px;

            text-decoration: none;

            color: var(--text-main);

            font-size: 16px;

            font-weight: 500;

            transition: 0.3s;

        }



        .nav-links a:hover {

            color: var(--primary);

        }



        .profile {

            margin-left: 25px;

            display: flex;

            align-items: center;

            cursor: pointer;

        }



        /* Standard Icon Replacement if FontAwesome is offline */

        .profile-circle {

            width: 32px;

            height: 32px;

            background: var(--primary);

            border-radius: 50%;

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 18px;

            color: white;

        }



        /* --- HERO SECTION --- */

        .hero {

            height: calc(100vh - 80px);

            display: flex;

            justify-content: center;

            align-items: center;

            text-align: center;

            position: relative;

            overflow: hidden;

        }



        /* WAVES */

        .wave {

            position: absolute;

            width: 200%;

            opacity: 0.15;

            pointer-events: none;

        }



        .wave1 { top: -50px; animation: waveMove 12s linear infinite; }

        .wave2 { bottom: -50px; animation: waveMoveReverse 15s linear infinite; }



        @keyframes waveMove {

            0% { transform: translateX(0); }

            100% { transform: translateX(-50%); }

        }



        @keyframes waveMoveReverse {

            0% { transform: translateX(-50%); }

            100% { transform: translateX(0); }

        }



        /* GLASS CARD */

        .hero-content {

            z-index: 2;

            max-width: 700px;

            background: rgba(255, 255, 255, 0.08);

            padding: 50px;

            border-radius: 30px;

            backdrop-filter: blur(15px);

            -webkit-backdrop-filter: blur(15px);

            border: 1px solid var(--glass-border);

            box-shadow: 0 15px 45px rgba(0,0,0,0.3);

            animation: fadeUp 0.8s ease-out;

        }



        @keyframes fadeUp {

            from { opacity: 0; transform: translateY(30px); }

            to { opacity: 1; transform: translateY(0); }

        }



        .hero-content h1 {

            font-size: 48px;

            margin-bottom: 20px;

            line-height: 1.2;

        }



        .highlight { color: var(--primary); }



        .hero-content p {

            font-size: 18px;

            color: var(--text-muted);

            margin-bottom: 40px;

            line-height: 1.6;

        }



        /* BUTTON */

        .btn {

            display: inline-block;

            padding: 16px 45px;

            border: none;

            border-radius: 50px;

            background: linear-gradient(90deg, var(--primary), var(--primary-dark));

            color: white;

            font-size: 17px;

            font-weight: bold;

            text-decoration: none;

            cursor: pointer;

            transition: 0.3s;

            box-shadow: 0 8px 20px rgba(77, 171, 247, 0.4);

        }



        .btn:hover {

            transform: scale(1.05);

            box-shadow: 0 12px 30px rgba(77, 171, 247, 0.6);

        }



        /* FOOTER */

        .footer {

            position: absolute;

            bottom: 15px;

            width: 100%;

            text-align: center;

            font-size: 12px;

            color: var(--text-muted);

            opacity: 0.6;

        }



        @media(max-width: 768px) {

            .navbar { padding: 0 20px; }

            .hero-content h1 { font-size: 32px; }

        }

    </style>

</head>



<body>



    <div class="navbar">

        <a href="/" class="logo">SASS</a>



        <div class="nav-right">

            <div class="nav-links">

                <a href="/" style="color: var(--primary);">Home</a>

                <a href="{{ url_for('about') }}">About Us</a>

            </div>



            <div class="profile">

                <div class="profile-circle">👤</div>

            </div>

        </div>

    </div>



    <div class="hero">

        <svg class="wave wave1" viewBox="0 0 1440 320">

            <path fill="#4dabf7" fill-opacity="0.4" d="M0,160L80,170C160,180,320,200,480,186.7C640,173,800,127,960,122.7C1120,117,1280,149,1360,165.3L1440,181V0H0Z"></path>

        </svg>



        <svg class="wave wave2" viewBox="0 0 1440 320">

            <path fill="#339af0" fill-opacity="0.4" d="M0,192L80,202.7C160,213,320,235,480,218.7C640,203,800,149,960,138.7C1120,128,1280,160,1360,176L1440,192V320H0Z"></path>

        </svg>



        <div class="hero-content">

            <h1>Service <span class="highlight">Appointment Services</span> System</h1>

            <p>Manage your appointments smarter. Keep everything organized, unified, and efficient—so scheduling your services is effortless.</p>

            <a href="{{ url_for('login') }}" class="btn">Get Started</a>

        </div>

    </div>



    <div class="footer">

        © 2026 All rights reserved.

    </div>



</body>

</html>
