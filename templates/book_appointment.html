<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background: #0a192f;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            background: #4dabf7;
            width: 100%;
            padding: 12px;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #339af0;
        }

        .cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="form-card">
    <h2>{{ 'Edit' if appt else 'Book' }} Appointment</h2>

    <form method="POST">

        <!-- SERVICE -->
        <label>Choose Service</label>
        <select name="service" required>
            {% for id, s in services.items() %}
            <option value="{{ s.service_id }}"
                {% if appt and appt.service == s.service_id %}selected{% endif %}>
                {{ s.service_name }}
            </option>
            {% endfor %}
        </select>

        <!-- DATE -->
        <label>Date</label>
        <input type="date" name="date" value="{{ appt.date if appt }}" required>

        <!-- TIME -->
        <label>Time</label>
        <input type="time" name="time" value="{{ appt.time if appt }}" required>

        <!-- SUBMIT -->
        <button type="submit" class="btn-submit">
            {{ 'Update Appointment' if appt else 'Confirm Booking' }}
        </button>

        <!-- CANCEL -->
        <a href="/user_dashboard" class="cancel">Cancel</a>

    </form>
</div>

</body>
</html>
