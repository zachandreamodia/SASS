{% extends "layout.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <div>
        <h1 style="margin: 0;">Service Catalog</h1>
        <p style="color: var(--text-muted); margin-top: 5px;">Manage your business offerings and pricing.</p>
    </div>
    
    <a href="/addservice" class="btn-primary" style="display: flex; align-items: center; gap: 10px; padding: 12px 24px; box-shadow: 0 4px 15px rgba(77, 171, 247, 0.3);">
        <i class="fas fa-plus"></i> Add New Service
    </a>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;">
    {% for id, s in services.items() %}
    <div class="card" style="display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border);">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <span style="font-size: 0.7rem; color: var(--primary); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">{{ s.category }}</span>
                <span style="font-weight: bold; color: var(--primary); font-size: 1.2rem;">${{ s.price }}</span>
            </div>
            <h3 style="margin: 10px 0;">{{ s.service_name }}</h3>
        </div>
        
        <div style="margin-top: 25px; display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 20px;">
            <a href="/edit_service/{{ id }}" class="btn-primary" style="flex: 1; text-align: center; background: var(--glass); border: 1px solid var(--primary); color: var(--primary); font-size: 0.85rem;">
                <i class="fas fa-edit"></i> Edit
            </a>
            <a href="/delete_service/{{ id }}" class="btn-primary" style="flex: 1; text-align: center; background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; color: #ff6b6b; font-size: 0.85rem;" onclick="return confirm('Are you sure you want to delete this service?')">
                <i class="fas fa-trash"></i> Delete
            </a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
