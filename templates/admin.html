<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #4dabf7; --bg: #0a192f; --glass: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; margin: 0; }
        .sidebar { width: 280px; height: 100vh; background: rgba(0,0,0,0.4); padding: 30px 20px; border-right: 1px solid var(--border); position: fixed; }
        .nav-link { display: flex; align-items: center; gap: 15px; padding: 12px 15px; color: #94a3b8; text-decoration: none; border-radius: 10px; margin-bottom: 10px; }
        .nav-link.active { background: var(--glass); color: var(--primary); }
        .main { margin-left: 280px; flex: 1; padding: 40px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .table-container { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 15px; font-size: 0.8rem; }
        td { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-add { background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2 style="color: var(--primary);">SASS ADMIN</h2>
        <a href="/admin" class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="/admin/bookings" class="nav-link"><i class="fas fa-book"></i> User Bookings</a>
        <a href="/logout" class="nav-link" style="margin-top:auto; color:#ff6b6b;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main">
        <div class="header-flex">
            <h1>Service Catalog</h1>
            <a href="/addservice" class="btn-add">+ Add New Service</a>
        </div>
        <div class="table-container">
            <table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Service Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th> <!-- ✅ NEW -->
        </tr>
    </thead>
    <tbody>
        {% for id, s in services.items() %}
        <tr>
            <td>#{{ s.service_id }}</td>
            <td>{{ s.service_name }}</td>
            <td>{{ s.category }}</td>
            <td>${{ s.price }}</td>
            <td><span style="color: #51cf66;">{{ s.status }}</span></td>

            <!-- ✅ NEW ACTION BUTTONS -->
            <td>
                <a href="{{ url_for('edit_service', id=s.service_id) }}" 
                   style="color:#4dabf7; margin-right:10px;">
                   <i class="fas fa-edit"></i>
                </a>

                <a href="{{ url_for('delete_service', id=s.service_id) }}"
                   style="color:#ff6b6b;"
                   onclick="return confirm('Are you sure you want to delete this service?')">
                   <i class="fas fa-trash"></i>
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
        </div>
    </main>
</body>
</html>
