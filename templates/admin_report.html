<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SASS | Reports</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --primary: #4dabf7; 
            --bg: #0a192f; 
            --glass: rgba(255,255,255,0.05); 
            --border: rgba(255,255,255,0.1); 
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            margin: 0; 
        }

        .sidebar { 
            width: 280px; 
            height: 100vh; 
            background: rgba(0,0,0,0.4); 
            padding: 30px 20px; 
            border-right: 1px solid var(--border); 
            position: fixed; 
        }

        .nav-link { 
            display: flex; 
            align-items: center;
            gap: 15px; 
            padding: 12px 15px; 
            color: #94a3b8; 
            text-decoration: none; 
            border-radius: 10px; 
            margin-bottom: 10px; 
        }

        .nav-link.active { 
            background: var(--glass); 
            color: var(--primary); 
        }

        .main { 
            margin-left: 280px; 
            flex: 1; 
            padding: 40px; 
        }

        .card { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 15px; 
            margin-bottom: 20px;
        }

        select {
            width: 300px;
            padding: 12px;
            margin-top: 10px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
        }

        button {
            background: var(--primary);
            padding: 12px 20px;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
        }

        th { 
            text-align: left; 
            color: var(--primary); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 10px; 
        }

        td { 
            padding: 15px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
    </style>
</head>

<body>

<aside class="sidebar">
    <h2 style="color: var(--primary);">SASS ADMIN</h2>

    <a href="/admin" class="nav-link">
        <i class="fas fa-th-large"></i> Dashboard
    </a>

    <a href="/admin/bookings" class="nav-link">
        <i class="fas fa-book"></i> User Bookings
    </a>

    <a href="/admin/report" class="nav-link active">
        <i class="fas fa-chart-bar"></i> Reports
    </a>

    <!-- ✅ Logout directly under Reports -->
    <a href="/logout" class="nav-link" style="color:#ff6b6b;">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</aside>

<main class="main">

    <h1>Service Reports</h1>

    <!-- FILTER -->
    <div class="card">
        <form method="POST">
            <label>Select Service</label><br>

            <select name="service" required>
                {% for id, s in services.items() %}
                <option value="{{ s.service_id }}">
                    {{ s.service_name }}
                </option>
                {% endfor %}
            </select>

            <button type="submit">Generate</button>
        </form>
    </div>

    <!-- RESULT -->
    {% if selected %}
    <div class="card">
        <h2>Report Summary</h2>

        <table>
            <thead>
                <tr>
                    <th>Daily</th>
                    <th>Weekly</th>
                    <th>Monthly</th>
                    <th>Yearly</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>{{ daily }}</td>
                    <td>{{ weekly }}</td>
                    <td>{{ monthly }}</td>
                    <td>{{ yearly }}</td>
                </tr>
            </tbody>
        </table>
    </div>
    {% endif %}

</main>

</body>
</html>
