<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASS | Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #4dabf7;
            --primary-dark: #339af0;
            --primary-glow: rgba(77, 171, 247, 0.4);
            --bg-gradient: linear-gradient(135deg, #102a43, #243b53);
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f5f7fa;
        }

        /* WAVES (Matching Home) */
        .wave-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            width: 200%;
            opacity: 0.1;
        }

        .wave1 { top: -10%; animation: waveMove 20s linear infinite; }
        .wave2 { bottom: -10%; animation: waveMoveReverse 25s linear infinite; }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes waveMoveReverse {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* LOGIN CARD (Matching Hero Content) */
        .login-card {
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            padding: 3rem 2.5rem;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-left: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: floating 6s ease-in-out infinite, fadeIn 0.8s ease-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .message {
            color: #ff8787;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            min-height: 1.2rem;
        }

        /* INPUT GROUPS */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 14px 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(77, 171, 247, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* OPTIONS */
        .options {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            color: #cbd5e1;
        }

        .options a {
            color: var(--primary);
            text-decoration: none;
        }

        .options a:hover { text-decoration: underline; }

        /* BUTTON (Matching Hero Button) */
        .btn-login {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #4dabf7, #339af0);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .btn-login:hover {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 15px 30px var(--primary-glow);
            filter: brightness(1.1);
        }

        .footer-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .footer-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        /* BACK BUTTON */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 100;
            text-decoration: none;
            color: #f5f7fa;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: 0.3s all ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary);
            border-color: var(--primary);
            transform: translateX(-5px);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        @media (max-width: 480px) {
            .back-btn {
                top: 20px;
                left: 20px;
                padding: 8px 15px;
            }
            .back-btn span { display: none; } /* Show only icon on mobile */
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Home</span>
    </a>
    <div class="wave-container">
        <svg class="wave wave1" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#4dabf7" d="M0,160L80,170C160,180,320,200,480,186.7C640,173,800,127,960,122.7C1120,117,1280,149,1360,165.3L1440,181V0H0Z"></path>
        </svg>
        <svg class="wave wave2" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="#339af0" d="M0,192L80,202.7C160,213,320,235,480,218.7C640,203,800,149,960,138.7C1120,128,1280,160,1360,176L1440,192V320H0Z"></path>
        </svg>
    </div>

    <div class="login-card">
        <div class="avatar">
            <i class="fas fa-user-shield" style="font-size: 30px;"></i>
        </div>
        
        <h2>Login</h2>
        <p class="subtitle">Access your SASS Dashboard</p>

        <div class="message">{{message}}</div>

        <form method="POST" action="/login">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i id="eye-icon" class="far fa-eye"></i>
                </button>
            </div>

           <!-- <div class="options">
                <label style="cursor: pointer;">
                    <input type="checkbox" style="accent-color: var(--primary);"> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>
            -->
            <button type="submit" class="btn-login">SIGN IN</button>
        </form>

        <!--
        <div class="footer-link">
            Don't have an account? <a href="#">Sign Up</a>
        </div>
    -->
    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById("password");
            const icon = document.getElementById("eye-icon");

            if (password.type === "password") {
                password.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                password.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
